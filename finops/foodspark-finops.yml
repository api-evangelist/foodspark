specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Foodspark
providerId: foodspark
publisherName: Foodspark
serviceCategory: Data-as-a-Service
created: '2026-05-04'
modified: '2026-06-02'
reconciled: true
tags:
  - Data
  - Food
  - Groceries
  - Restaurants
  - Web Scraping
  - FinOps
  - FOCUS
description: >-
  FOCUS-aligned FinOps view for Foodspark, a custom-quoted managed food / grocery
  / restaurant data-extraction service. Spend is project-based and
  contract-negotiated (not self-serve usage-metered), so cost shows up as
  recurring data-service charges scoped by target platforms, data volume, and
  refresh cadence.
sources:
  - https://www.foodspark.io/pricing/
  - https://www.foodspark.io/food-data-api/
  - https://www.foodspark.io/contact/
principles:
  - name: Visibility
    description: >-
      Foodspark exposes no self-serve usage dashboard or billing API. Track spend
      from the negotiated contract and Foodspark invoices; reconcile delivered
      data volume against the agreed project scope.
  - name: Allocation
    description: >-
      Attribute the data-service contract to the consuming team, product, and
      data domain (menus, pricing, delivery) since billing is project-scoped
      rather than per-call.
  - name: Optimization
    description: >-
      Control cost by narrowing the target platform list, reducing extracted
      field/record scope, and lowering refresh cadence to the minimum the use
      case needs, since each materially affects the quote.
  - name: Accountability
    description: >-
      Assign a contract owner to review scope versus delivered data each billing
      period and to renegotiate platform coverage and refresh rate as needs change.
billingModel:
  pricingCategory: Custom / Quote-Based
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Foodspark Food Data Service
  ServiceCategory: Data-as-a-Service
  ProviderName: Foodspark
  PublisherName: Foodspark
  InvoiceIssuerName: Foodspark
  PricingCategory: Custom / Quote-Based
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: data_service_engagement
    description: >-
      Project / contract-level managed data-extraction charge; the billable unit
      is the negotiated engagement, scoped by platforms, volume, and cadence.
    unit: varies
    aggregation: sum
    dimensions:
      - target_platform
      - data_domain
      - refresh_cadence
maintainers:
