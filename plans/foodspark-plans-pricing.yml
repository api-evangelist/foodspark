specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Foodspark
providerId: foodspark
created: '2026-05-04'
modified: '2026-06-02'
reconciled: true
tags:
  - Data
  - Food
  - Groceries
  - Restaurants
  - Web Scraping
description: >-
  Foodspark prices as a managed data-as-a-service / web-scraping engagement, not
  a self-serve metered API. There are no published Free/Pro/Enterprise tiers and
  no public per-request price list. The pricing page states cost depends on data
  set volume and complexity, the count of websites and platforms targeted, the
  rate of scraping, and any extra robust-crawling requirements, then directs
  prospects to request a custom quote. Engagement is sales-led ("Request a
  Quote", contact sales@foodspark.io); endpoint, authentication, and delivery
  details are shared with customers post-engagement.
sources:
  - https://www.foodspark.io/pricing/
  - https://www.foodspark.io/food-data-api/
  - https://www.foodspark.io/contact/
plans:
  - id: foodspark-custom-data-service
    name: Custom Data Service
    type: enterprise
    description: >-
      Quote-based managed food, grocery, restaurant, and food-delivery data
      extraction engagement scoped to the customer's target platforms, volume,
      refresh rate, and delivery format. All pricing is custom-negotiated.
    entries:
      - label: Engagement
        description: >-
          Custom-scoped scraping / data-extraction engagement. Cost is
          determined by data set volume and complexity, the count of target
          websites and platforms, the scraping / refresh rate, and any
          robust-crawling requirements. Quoted per project.
        name: engagement
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        domains: []
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Custom Data Set Scoping
      - name: Multi-Platform Coverage (100+ Sources)
      - name: Choice of Delivery Format (CSV / JSON / XML / Feed)
      - name: Configurable Refresh / Scraping Rate
      - name: Dedicated Project / Account Management
      - name: Foodspark Food Data Service
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
